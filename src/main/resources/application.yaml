spring:
  application:
    name: hackathon-G5Dev

  # === NEON DATABASE ===
  datasource:
    url: jdbc:postgresql://ep-purple-night-agj7d7ik-pooler.c-2.eu-central-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    username: ${NEON_DB_USER:neon_user}
    password: ${NEON_DB_PASSWORD:neon_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000

  # === JPA ===
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # === LIQUIBASE ===
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

# === JWT ===
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:dev-secret-key-very-long-for-testing-purposes-only}
      expiration: 86400000

# === SERVER ===
server:
  port: 8080

# === LOGGING ===
logging:
  level:
    com.hackathon.carbone: DEBUG
    org.springframework.security: DEBUG
    liquibase: INFO